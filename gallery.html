<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Gallery — STARFACE</title>

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fefdfb;
      color: #000;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      display: flex;
      gap: 28px;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .top-nav a {
      text-decoration: none;
      color: rgba(0,0,0,0.66);
    }

    .logo-bar {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(280px, 18vw);
      height: 18px;
      display: flex;
      align-items: center;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery {
      margin-top: 140px;
      padding: 0 40px 80px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 18px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Existing mobile */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        padding: 0 20px 60px;
      }
    }

    /* NEW: Header + layout mobile fix */
    @media (max-width: 768px) {
      .logo-bar,
      .top-nav {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
      }

      .logo-bar {
        order: 1;
        width: min(220px, 64vw);
        height: auto;
        margin-bottom: 26px;
      }

      .top-nav {
        order: 2;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px 22px;
      }

      .top-nav a {
        font-size: 10px;
        letter-spacing: 0.11em;
      }
    }
  </style>
</head>

<body>

<nav class="top-nav">
  <a href="https://shop.thestarface.com/">Starface Store</a>
  <a href="about.html">About</a>
  <a href="gallery.html">Gallery</a>
  <a href="https://shop.thestarface.com/pages/contact">Contact</a>
  <a href="https://shop.thestarface.com/pages/faq">FAQ</a>
</nav>

<div class="logo-bar">
  <img src="images/STARFACELOGO.png" class="logo" />
</div>

<section class="gallery">
  <img src="images/gallery1.jpg" />
  <img src="images/gallery2.jpg" />
  <img src="images/gallery3.jpg" />
  <img src="images/gallery4.jpg" />
  <img src="images/gallery5.jpg" />
  <img src="images/gallery6.jpg" />
  <img src="images/gallery7.jpg" />
  <img src="images/gallery8.jpg" />
  <img src="images/gallery9.jpg" />
  <img src="images/gallery10.jpg" />
  <img src="images/gallery11.jpg" />
  <img src="images/gallery12.jpg" />
</section>

</body>
</html>

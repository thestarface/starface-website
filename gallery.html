<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Gallery — STARFACE</title>

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fefdfb;
      color: #000;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      display: flex;
      gap: 28px;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .top-nav a {
      text-decoration: none;
      color: rgba(0,0,0,0.66);
    }

    .logo-bar {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
    }

    .logo {
      width: 100%;
    }

    .gallery {
      margin-top: 140px;
      padding: 0 40px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: 1fr;
        padding: 0 20px 60px;
      }
    }
  </style>
</head>

<body>

<nav class="top-nav">
  <a href="https://shop.thestarface.com/">Starface Store</a>
  <a href="about.html">About</a>
  <a href="gallery.html">Gallery</a>
  <a href="https://shop.thestarface.com/pages/contact">Contact</a>
  <a href="https://shop.thestarface.com/pages/faq">FAQ</a>
</nav>

<div class="logo-bar">
  <img src="images/STARFACELOGO.png" class="logo" />
</div>

<section class="gallery">
  <img src="images/gallery1.jpg" />
  <img src="images/gallery2.jpg" />
  <img src="images/gallery3.jpg" />
  <img src="images/gallery4.jpg" />
  <img src="images/gallery5.jpg" />
  <img src="images/gallery6.jpg" />
</section>

</body>
</html>

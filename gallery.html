<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Gallery — STARFACE</title>

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fefdfb;
      color: #000;
      overflow-x: hidden;
    }

    .site-header {
      position: relative;
      width: 100%;
      min-height: 96px;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 28px;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .top-nav a {
      text-decoration: none;
      color: rgba(0,0,0,0.66);
      white-space: nowrap;
    }

    .top-nav a:hover {
      color: #000;
    }

    .nav-ig {
      display: flex;
      align-items: center;
    }

    .nav-ig svg {
      width: 18px;
      height: 18px;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .nav-ig:hover svg {
      opacity: 1;
    }

    .utility-nav {
      display: none;
      color: rgba(0,0,0,0.66);
      text-decoration: none;
      align-items: center;
    }

    .utility-nav svg {
      width: 18px;
      height: 18px;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .utility-nav:hover svg {
      opacity: 1;
    }

    .logo-bar {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(280px, 18vw);
      height: 18px;
      display: flex;
      align-items: center;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .page-shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 28px;
      width: 100%;
    }

    .gallery-page {
      padding-top: 44px;
      padding-bottom: 80px;
    }

    .gallery-heading {
      padding: 0 40px 28px;
    }

    .gallery-heading h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 8px 0;
    }

    .gallery-heading p {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.58);
      margin: 0;
    }

    .carousel-wrap {
      position: relative;
      padding: 0 72px;
    }

    .carousel {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 8px;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel img {
      flex: 0 0 auto;
      width: min(320px, 24vw);
      height: auto;
      display: block;
      scroll-snap-align: start;
      cursor: zoom-in;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      color: rgba(0,0,0,0.35);
      cursor: pointer;
      font-size: 26px;
      font-weight: 300;
      line-height: 1;
      z-index: 5;
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }

    .carousel-btn:hover {
      color: #000;
      opacity: 1;
      transform: translateY(-50%) scale(1.05);
    }

    .carousel-btn.left {
      left: 20px;
    }

    .carousel-btn.right {
      right: 20px;
    }

    .footer-heading {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
    }

    .footer-link {
      color: rgba(0, 0, 0, 0.72);
      text-decoration: none;
    }

    .footer-link:hover {
      color: #000;
    }

    .footer-links .footer-link + .footer-link {
      margin-top: 8px;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1fr;
      gap: 44px;
      align-items: start;
      min-height: 140px;
    }

    .footer-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(100px, 135px));
      gap: 22px;
    }

    .footer-copy {
      padding-top: 30px;
      text-align: center;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.5);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(254,253,251,0.94);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 84vh;
      width: auto;
      height: auto;
      cursor: zoom-in;
      transition: transform 0.25s ease;
    }

    .lightbox img.zoomed {
      transform: scale(1.35);
      cursor: zoom-out;
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 34px;
      background: none;
      border: none;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      color: rgba(0,0,0,0.7);
    }

    .lightbox-close:hover {
      color: #000;
    }

    @media (max-width: 768px) {
      .site-header {
        min-height: auto;
        padding: 28px 18px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .logo-bar,
      .top-nav {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
      }

      .logo-bar {
        order: 1;
        width: min(220px, 64vw);
        height: auto;
        margin-bottom: 26px;
      }

      .top-nav {
        order: 2;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px 22px;
        margin-bottom: 48px;
      }

      .top-nav a {
        font-size: 10px;
        letter-spacing: 0.11em;
      }

      .nav-ig svg {
        width: 17px;
        height: 17px;
      }

      .page-shell {
        padding-left: 18px;
        padding-right: 18px;
      }

      .gallery-page {
        padding-top: 0;
        padding-bottom: 60px;
      }

      .gallery-heading {
        padding: 0 0 24px;
      }

      .gallery-heading h1 {
        font-size: 20px;
      }

      .carousel-wrap {
        padding: 0 34px;
      }

      .carousel {
        gap: 14px;
      }

      .carousel img {
        width: min(260px, 72vw);
      }

      .carousel-btn {
        font-size: 24px;
      }

      .carousel-btn.left {
        left: 0;
      }

      .carousel-btn.right {
        right: 0;
      }

      .footer-links {
        grid-template-columns: 1fr;
        gap: 26px;
        text-align: center;
      }

      .footer-copy {
        padding-top: 36px;
        padding-bottom: 10px;
      }

      .lightbox {
        padding: 22px;
      }

      .lightbox img {
        max-width: 94vw;
        max-height: 78vh;
      }

      .lightbox img.zoomed {
        transform: scale(1.18);
      }

      .lightbox-close {
        top: 20px;
        right: 22px;
        font-size: 32px;
      }
    }

    @media (max-width: 1100px) and (orientation: landscape) and (max-height: 520px) {
      html,
      body {
        overflow-x: hidden !important;
        overflow-y: auto !important;
      }

      .site-header {
        min-height: 76px !important;
        padding: 0 !important;
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) !important;
        grid-template-rows: 76px !important;
        align-items: center !important;
      }

      .top-nav,
      .logo-bar,
      .utility-nav {
        position: relative !important;
        top: auto !important;
        left: auto !important;
        right: auto !important;
        transform: none !important;
      }

      .top-nav {
        grid-column: 1 / 2 !important;
        grid-row: 1 !important;
        align-self: center !important;
        justify-self: start !important;
        order: initial !important;
        justify-content: flex-start !important;
        flex-wrap: nowrap !important;
        gap: clamp(8px, 1.4vw, 14px) !important;
        margin: 0 0 0 24px !important;
        max-width: calc(50vw - 105px) !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        scrollbar-width: none !important;
        -ms-overflow-style: none !important;
        z-index: 20 !important;
      }

      .top-nav::-webkit-scrollbar {
        display: none !important;
      }

      .top-nav a {
        font-size: clamp(8px, 1.2vw, 9.5px) !important;
        letter-spacing: 0.09em !important;
        flex: 0 0 auto !important;
      }

      .top-nav .nav-ig {
        display: none !important;
      }

      .utility-nav {
        display: flex !important;
        grid-column: 3 / 4 !important;
        grid-row: 1 !important;
        align-self: center !important;
        justify-self: end !important;
        margin: 0 24px 0 0 !important;
        color: rgba(0,0,0,0.66) !important;
        z-index: 20 !important;
      }

      .utility-nav svg {
        width: 15px !important;
        height: 15px !important;
      }

      .logo-bar {
        grid-column: 2 / 3 !important;
        grid-row: 1 !important;
        align-self: center !important;
        justify-self: center !important;
        order: initial !important;
        width: clamp(120px, 18vw, 190px) !important;
        height: auto !important;
        margin: 0 !important;
        z-index: 10 !important;
      }

      .gallery-page {
        padding-top: 6px;
        padding-bottom: 32px;
      }

      .gallery-heading {
        padding: 0 64px 18px;
      }

      .gallery-heading h1 {
        font-size: 18px;
      }

      .gallery-heading p {
        font-size: 10px;
      }

      .carousel-wrap {
        padding: 0 58px;
      }

      .carousel img {
        width: min(220px, 28vw);
      }

      .carousel-btn {
        font-size: 22px;
      }

      .carousel-btn.left {
        left: 24px;
      }

      .carousel-btn.right {
        right: 24px;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <nav class="top-nav">
    <a href="https://thestarface.com/">Home</a>
    <a href="https://shop.thestarface.com/">Starface Store</a>
    <a href="gallery.html" class="top-nav-link">Gallery</a>
    <a href="about.html">About</a>
    <a href="https://shop.thestarface.com/pages/contact">Contact</a>
    <a href="https://shop.thestarface.com/pages/faq">FAQ</a>

    <a href="https://instagram.com/thestarfaceco" target="_blank" rel="noopener noreferrer" class="nav-ig" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="17.4" cy="6.6" r="1"></circle>
      </svg>
    </a>
  </nav>

  <a href="https://thestarface.com" class="logo-bar" aria-label="STARFACE home">
    <img src="images/STARFACELOGO.png" class="logo" alt="STARFACE" />
  </a>

  <a href="https://instagram.com/thestarfaceco" target="_blank" rel="noopener noreferrer" class="utility-nav" aria-label="Instagram">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
      <circle cx="12" cy="12" r="4"></circle>
      <circle cx="17.4" cy="6.6" r="1"></circle>
    </svg>
  </a>
</header>

<main class="gallery-page">
  <div class="gallery-heading">
    <h1>Space Kid — Series 01</h1>
    <p>Gallery</p>
  </div>

  <div class="carousel-wrap">
    <button class="carousel-btn left" type="button" aria-label="Previous image">&#8592;</button>

    <section class="carousel" id="galleryCarousel">
      <img src="images/gallery1.jpg" alt="Space Kid gallery image 1" />
      <img src="images/gallery2.jpg" alt="Space Kid gallery image 2" />
      <img src="images/gallery3.jpg" alt="Space Kid gallery image 3" />
      <img src="images/gallery4.jpg" alt="Space Kid gallery image 4" />
      <img src="images/gallery5.jpg" alt="Space Kid gallery image 5" />
      <img src="images/gallery6.jpg" alt="Space Kid gallery image 6" />
      <img src="images/gallery7.jpg" alt="Space Kid gallery image 7" />
      <img src="images/gallery8.jpg" alt="Space Kid gallery image 8" />
      <img src="images/gallery9.jpg" alt="Space Kid gallery image 9" />
      <img src="images/gallery10.jpg" alt="Space Kid gallery image 10" />
      <img src="images/gallery11.jpg" alt="Space Kid gallery image 11" />
      <img src="images/gallery12.jpg" alt="Space Kid gallery image 12" />
      <img src="images/gallery13.jpg" alt="Space Kid gallery image 13" />
      <img src="images/gallery14.jpg" alt="Space Kid gallery image 14" />
      <img src="images/gallery15.jpg" alt="Space Kid gallery image 15" />
      <img src="images/gallery16.jpg" alt="Space Kid gallery image 16" />
      <img src="images/gallery17.jpg" alt="Space Kid gallery image 17" />
      <img src="images/gallery18.jpg" alt="Space Kid gallery image 18" />
    </section>

    <button class="carousel-btn right" type="button" aria-label="Next image">&#8594;</button>
  </div>
</main>

<footer>
  <div class="page-shell">
    <div class="pt-12 pb-8">
      <div class="footer-top">
        <div class="footer-links text-sm">
          <div>
            <div class="footer-heading mb-4">About</div>
            <a href="about.html" class="footer-link">About Us</a>
          </div>

          <div>
            <div class="footer-heading mb-4">Support</div>
            <a href="https://shop.thestarface.com/pages/contact" class="footer-link">Contact</a>
            <a href="https://shop.thestarface.com/policies/refund-policy" class="footer-link block">Returns</a>
            <a href="https://shop.thestarface.com/policies/shipping-policy" class="footer-link block">Shipping</a>
          </div>

          <div>
            <div class="footer-heading mb-4">Legal</div>
            <a href="https://shop.thestarface.com/policies/privacy-policy" class="footer-link block">Privacy</a>
            <a href="https://shop.thestarface.com/policies/terms-of-service" class="footer-link block">Site Terms</a>
          </div>
        </div>
      </div>

      <div class="footer-copy">
        © 2026 STARFACE Ltd. All rights reserved.
      </div>
    </div>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" type="button" aria-label="Close image">×</button>
  <img src="" alt="" id="lightboxImage" />
</div>

<script>
  const carousel = document.getElementById('galleryCarousel');
  const leftBtn = document.querySelector('.carousel-btn.left');
  const rightBtn = document.querySelector('.carousel-btn.right');
  const lightbox = document.getElementById('lightbox');
  const lightboxImage = document.getElementById('lightboxImage');
  const closeBtn = document.querySelector('.lightbox-close');

  function scrollGallery(direction) {
    const firstImage = carousel.querySelector('img');
    const imageWidth = firstImage ? firstImage.offsetWidth : 300;
    const gap = 18;

    carousel.scrollBy({
      left: direction * (imageWidth + gap),
      behavior: 'smooth'
    });
  }

  leftBtn.addEventListener('click', () => scrollGallery(-1));
  rightBtn.addEventListener('click', () => scrollGallery(1));

  carousel.querySelectorAll('img').forEach((img) => {
    img.addEventListener('click', () => {
      lightboxImage.src = img.src;
      lightboxImage.alt = img.alt;
      lightboxImage.classList.remove('zoomed');
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  lightboxImage.addEventListener('click', (event) => {
    event.stopPropagation();
    lightboxImage.classList.toggle('zoomed');
  });

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxImage.classList.remove('zoomed');
    lightboxImage.src = '';
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeLightbox);

  lightbox.addEventListener('click', (event) => {
    if (event.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeLightbox();
    }
  });
</script>

</body>
</html>

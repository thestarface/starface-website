<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Gallery — STARFACE</title>

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fefdfb;
      color: #000;
      overflow-x: hidden;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 10;
      display: flex;
      gap: 28px;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .top-nav a {
      text-decoration: none;
      color: rgba(0,0,0,0.66);
    }

    .top-nav a:hover {
      color: #000;
    }

    .logo-bar {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(280px, 18vw);
      height: 18px;
      display: flex;
      align-items: center;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery-page {
      padding-top: 140px;
      padding-bottom: 80px;
    }

    .gallery-heading {
      padding: 0 40px 28px;
    }

    .gallery-heading h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 8px 0;
    }

    .gallery-heading p {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.58);
      margin: 0;
    }

    .carousel-wrap {
      position: relative;
      padding: 0 72px;
    }

    .carousel {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 8px;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel img {
      flex: 0 0 auto;
      width: min(320px, 24vw);
      height: auto;
      display: block;
      scroll-snap-align: start;
      cursor: zoom-in;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      color: rgba(0,0,0,0.6);
      cursor: pointer;
      font-size: 38px;
      line-height: 1;
      z-index: 5;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .carousel-btn:hover {
      opacity: 1;
      transform: translateY(-50%) scale(1.08);
    }

    .carousel-btn.left {
      left: 28px;
    }

    .carousel-btn.right {
      right: 28px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(254,253,251,0.94);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 84vh;
      width: auto;
      height: auto;
      cursor: zoom-in;
      transition: transform 0.25s ease;
    }

    .lightbox img.zoomed {
      transform: scale(1.35);
      cursor: zoom-out;
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 34px;
      background: none;
      border: none;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      color: rgba(0,0,0,0.7);
    }

    .lightbox-close:hover {
      color: #000;
    }

    @media (max-width: 768px) {
      body {
        overflow-x: hidden;
        padding: 28px 18px 0;
      }

      .top-nav,
      .logo-bar {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
      }

      .logo-bar {
        width: min(220px, 64vw);
        height: auto;
        margin: 0 auto 26px;
      }

      .top-nav {
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px 22px;
        margin-bottom: 48px;
      }

      .top-nav a {
        font-size: 10px;
        letter-spacing: 0.11em;
      }

      .gallery-page {
        padding-top: 0;
        padding-bottom: 60px;
      }

      .gallery-heading {
        padding: 0 0 24px;
      }

      .gallery-heading h1 {
        font-size: 20px;
      }

      .carousel-wrap {
        padding: 0 34px;
      }

      .carousel {
        gap: 14px;
      }

      .carousel img {
        width: min(260px, 72vw);
      }

      .carousel-btn {
        font-size: 32px;
      }

      .carousel-btn.left {
        left: 0;
      }

      .carousel-btn.right {
        right: 0;
      }

      .lightbox {
        padding: 22px;
      }

      .lightbox img {
        max-width: 94vw;
        max-height: 78vh;
      }

      .lightbox img.zoomed {
        transform: scale(1.18);
      }

      .lightbox-close {
        top: 20px;
        right: 22px;
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

<nav class="top-nav">
  <a href="https://shop.thestarface.com/">Starface Store</a>
  <a href="about.html">About</a>
  <a href="https://shop.thestarface.com/pages/contact">Contact</a>
  <a href="https://shop.thestarface.com/pages/faq">FAQ</a>
</nav>

<div class="logo-bar">
  <img src="images/STARFACELOGO.png" class="logo" alt="STARFACE" />
</div>

<main class="gallery-page">
  <div class="gallery-heading">
    <h1>Space Kid — Series 01</h1>
    <p>Gallery</p>
  </div>

  <div class="carousel-wrap">
    <button class="carousel-btn left" type="button" aria-label="Previous image">‹</button>

    <section class="carousel" id="galleryCarousel">
      <img src="images/gallery1.jpg" alt="Space Kid gallery image 1" />
      <img src="images/gallery2.jpg" alt="Space Kid gallery image 2" />
      <img src="images/gallery3.jpg" alt="Space Kid gallery image 3" />
      <img src="images/gallery4.jpg" alt="Space Kid gallery image 4" />
      <img src="images/gallery5.jpg" alt="Space Kid gallery image 5" />
      <img src="images/gallery6.jpg" alt="Space Kid gallery image 6" />
      <img src="images/gallery7.jpg" alt="Space Kid gallery image 7" />
      <img src="images/gallery8.jpg" alt="Space Kid gallery image 8" />
      <img src="images/gallery9.jpg" alt="Space Kid gallery image 9" />
      <img src="images/gallery10.jpg" alt="Space Kid gallery image 10" />
      <img src="images/gallery11.jpg" alt="Space Kid gallery image 11" />
      <img src="images/gallery12.jpg" alt="Space Kid gallery image 12" />
      <img src="images/gallery13.jpg" alt="Space Kid gallery image 13" />
      <img src="images/gallery14.jpg" alt="Space Kid gallery image 14" />
      <img src="images/gallery15.jpg" alt="Space Kid gallery image 15" />
      <img src="images/gallery16.jpg" alt="Space Kid gallery image 16" />
      <img src="images/gallery17.jpg" alt="Space Kid gallery image 17" />
      <img src="images/gallery18.jpg" alt="Space Kid gallery image 18" />
    </section>

    <button class="carousel-btn right" type="button" aria-label="Next image">›</button>
  </div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" type="button" aria-label="Close image">×</button>
  <img src="" alt="" id="lightboxImage" />
</div>

<script>
  const carousel = document.getElementById('galleryCarousel');
  const leftBtn = document.querySelector('.carousel-btn.left');
  const rightBtn = document.querySelector('.carousel-btn.right');
  const lightbox = document.getElementById('lightbox');
  const lightboxImage = document.getElementById('lightboxImage');
  const closeBtn = document.querySelector('.lightbox-close');

  function scrollGallery(direction) {
    const firstImage = carousel.querySelector('img');
    const imageWidth = firstImage ? firstImage.offsetWidth : 300;
    const gap = 18;

    carousel.scrollBy({
      left: direction * (imageWidth + gap),
      behavior: 'smooth'
    });
  }

  leftBtn.addEventListener('click', () => scrollGallery(-1));
  rightBtn.addEventListener('click', () => scrollGallery(1));

  carousel.querySelectorAll('img').forEach((img) => {
    img.addEventListener('click', () => {
      lightboxImage.src = img.src;
      lightboxImage.alt = img.alt;
      lightboxImage.classList.remove('zoomed');
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  lightboxImage.addEventListener('click', (event) => {
    event.stopPropagation();
    lightboxImage.classList.toggle('zoomed');
  });

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxImage.classList.remove('zoomed');
    lightboxImage.src = '';
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeLightbox);

  lightbox.addEventListener('click', (event) => {
    if (event.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeLightbox();
    }
  });
</script>

</body>
</html>

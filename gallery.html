<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Gallery — STARFACE</title>

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fefdfb;
      color: #000;
      overflow-x: hidden;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 10;
      display: flex;
      gap: 28px;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .top-nav a {
      text-decoration: none;
      color: rgba(0,0,0,0.66);
    }

    .top-nav a:hover {
      color: #000;
    }

    .nav-ig {
      display: flex;
      align-items: center;
    }

    .nav-ig svg {
      width: 18px;
      height: 18px;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .nav-ig:hover svg {
      opacity: 1;
    }

    .logo-bar {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(280px, 18vw);
      height: 18px;
      display: flex;
      align-items: center;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery-page {
      padding-top: 140px;
      padding-bottom: 80px;
    }

    .gallery-heading {
      padding: 0 40px 28px;
    }

    .gallery-heading h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 8px 0;
    }

    .gallery-heading p {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.58);
      margin: 0;
    }

    .carousel-wrap {
      position: relative;
      padding: 0 72px;
    }

    .carousel {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 8px;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel img {
      flex: 0 0 auto;
      width: min(320px, 24vw);
      height: auto;
      display: block;
      scroll-snap-align: start;
      cursor: zoom-in;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      color: rgba(0,0,0,0.35);
      cursor: pointer;
      font-size: 26px;
      font-weight: 300;
      line-height: 1;
      z-index: 5;
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }

    .carousel-btn:hover {
      color: #000;
      opacity: 1;
      transform: translateY(-50%) scale(1.05);
    }

    .carousel-btn.left {
      left: 20px;
    }

    .carousel-btn.right {
      right: 20px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(254,253,251,0.94);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 84vh;
      width: auto;
      height: auto;
      cursor: zoom-in;
      transition: transform 0.25s ease;
    }

    .lightbox img.zoomed {
      transform: scale(1.35);
      cursor: zoom-out;
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 34px;
      background: none;
      border: none;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      color: rgba(0,0,0,0.7);
    }

    .lightbox-close:hover {
      color: #000;
    }

    @media (max-width: 768px) {
      body {
        overflow-x: hidden;
        padding: 28px 18px 0;
      }

      .top-nav,
      .logo-bar {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
      }

      .logo-bar {
        width: min(220px, 64vw);
        height: auto;
        margin: 0 auto 26px;
      }

      .top-nav {
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px 22px;
        margin-bottom: 48px;
      }

      .top-nav a {
        font-size: 10px;
        letter-spacing: 0.11em;
      }

      .nav-ig svg {
        width: 17px;
        height: 17px;
      }

      .gallery-page {
        padding-top: 0;
        padding-bottom: 60px;
      }

      .gallery-heading {
        padding: 0 0 24px;
      }

      .gallery-heading h1 {
        font-size: 20px;
      }

      .carousel-wrap {
        padding: 0 34px;
      }

      .carousel {
        gap: 14px;
      }

      .carousel img {
        width: min(260px, 72vw);
      }

      .carousel-btn {
        font-size: 24px;
      }

      .carousel-btn.left {
        left: 0;
      }

      .carousel-btn.right {
        right: 0;
      }

      .lightbox {
        padding: 22px;
      }

      .lightbox img {
        max-width: 94vw;
        max-height: 78vh;
      }

      .lightbox img.zoomed {
        transform: scale(1.18);
      }

      .lightbox-close {
        top: 20px;
        right: 22px;
        font-size: 32px;
      }
    }

    @media (max-width: 900px) and (orientation: landscape) and (max-height: 520px) {
      body {
        padding: 0;
        overflow-x: hidden;
      }

      .top-nav,
      .logo-bar {
        position: absolute;
      }

      .top-nav {
        top: 24px;
        left: 24px;
        justify-content: flex-start;
        flex-wrap: nowrap;
        gap: 14px;
        margin: 0;
      }

      .top-nav a {
        font-size: 9.5px;
        letter-spacing: 0.09em;
      }

      .nav-ig svg {
        width: 15px;
        height: 15px;
      }

      .logo-bar {
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: min(190px, 18vw);
        height: 18px;
        margin: 0;
      }

      .gallery-page {
        padding-top: 82px;
        padding-bottom: 32px;
      }

      .gallery-heading {
        padding: 0 64px 18px;
      }

      .gallery-heading h1 {
        font-size: 18px;
      }

      .gallery-heading p {
        font-size: 10px;
      }

      .carousel-wrap {
        padding: 0 58px;
      }

      .carousel img {
        width: min(220px, 28vw);
      }

      .carousel-btn {
        font-size: 22px;
      }

      .carousel-btn.left {
        left: 24px;
      }

      .carousel-btn.right {
        right: 24px;
      }
    }
  </style>
</head>

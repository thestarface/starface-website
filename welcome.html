<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE — Welcome</title>
  <meta name="description" content="Welcome to STARFACE. A collectible world shaped by character, form, and imagination — launching with Space Kid Series 01." />

  <link rel="icon" href="/favicon.ico" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
    }

    html {
      background: var(--bg);
      overscroll-behavior-x: none;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .top-divider {
      width: 100%;
      height: 1px;
      background: rgba(0, 0, 0, 0.14);
      margin-top: 28px;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .header-shell {
      width: 100%;
      padding-left: 28px;
      padding-right: 40px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      height: 128px;
      width: auto;
    }

    .top-nav {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .top-nav-link {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.68);
      text-decoration: none;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .top-nav-link:hover {
      color: #000;
    }

    .page-shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 28px;
      width: 100%;
    }

    .hero-section {
      padding-top: 4px;
    }

    .hero-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-image {
      width: 100%;
      max-width: 1420px;
      margin: 0 auto;
    }

    .cta-section {
      padding-top: 18px;
      padding-bottom: 90px;
      text-align: center;
    }

    .intro-copy {
      max-width: 1000px;
      margin: 0 auto;
    }

    .cta {
      display: inline-block;
      border: 1.5px solid #000;
      background: transparent;
      color: #000;
      text-decoration: none;
      transition: all 0.25s ease;
      font-size: 16px;
      letter-spacing: 0.22em;
      font-weight: 500;
      padding: 16px 42px;
      text-transform: uppercase;
      line-height: 1;
      border-radius: 999px;
    }

    .cta:hover {
      background: #000;
      color: #fff;
      transform: translateY(-1px);
    }

    .footer-heading {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
    }

    .footer-link {
      color: rgba(0, 0, 0, 0.72);
      text-decoration: none;
    }

    .footer-link:hover {
      color: #000;
    }

    .footer-links .footer-link + .footer-link {
      margin-top: 8px;
    }

    .footer-top {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 44px;
      align-items: start;
      min-height: 140px;
    }

    .footer-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(100px, 135px));
      gap: 22px;
    }

    .connect-column {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 250px;
    }

    .social-slot {
      display: flex;
      gap: 20px;
      margin-top: 2px;
    }

    .social-icon {
      opacity: 0.72;
      transition: opacity 0.25s ease;
    }

    .social-icon:hover {
      opacity: 1;
    }

    .instagram-icon {
      width: 35px;
      height: 35px;
      display: block;
    }

    .footer-copy {
      padding-top: 30px;
      text-align: center;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.5);
    }

    /* MOBILE FIXES */
    @media (max-width: 768px) {

      .top-divider {
        margin-top: 16px;
      }

      .header-shell {
        padding-left: 18px;
        padding-right: 18px;
      }

      .header-row {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .logo {
        height: 78px;
      }

      .top-nav {
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      .top-nav-link {
        font-size: 10px;
        letter-spacing: 0.11em;
      }

      .page-shell {
        padding: 0 14px;
      }

      .hero-section {
        padding-top: 18px;
      }

      /* ✅ FIXED HERO (no cropping anymore) */
      .hero-image {
        width: 100%;
        max-width: 100%;
        margin-left: 0;
      }

      .cta-section {
        padding-top: 16px;
        padding-bottom: 64px;
      }

      .cta {
        font-size: 13px;
        letter-spacing: 0.2em;
        padding: 14px 34px;
      }

      .footer-top {
        grid-template-columns: 1fr;
        gap: 32px;
        min-height: auto;
      }

      .footer-links {
        grid-template-columns: 1fr;
        gap: 26px;
        text-align: center;
      }

      .connect-column {
        align-items: center;
        min-width: 0;
      }

      .footer-copy {
        padding-top: 36px;
        padding-bottom: 10px;
      }
    }

    @media (max-width: 420px) {
      .hero-image {
        width: 100%;
        max-width: 100%;
        margin-left: 0;
      }

      .top-nav {
        gap: 14px;
      }

      .top-nav-link {
        font-size: 9.5px;
      }
    }

  </style>
</head>

<body>

<div class="top-divider"></div>

<header class="pb-4" style="margin-top: -4px;">
  <div class="header-shell header-row">
    <img src="images/STARFACELOGO.png" alt="STARFACE" class="logo" />

    <nav class="top-nav" aria-label="Primary">
      <a href="https://shop.thestarface.com/" class="top-nav-link">Starface Store</a>
      <a href="about.html" class="top-nav-link">About</a>
      <a href="https://shop.thestarface.com/pages/contact" class="top-nav-link">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-section">
    <div class="page-shell">
      <div class="hero-wrap">
        <img src="images/allspacekids.png" alt="All six Space Kid variants" class="hero-image" />
      </div>
    </div>
  </section>

  <section class="cta-section">
    <div class="page-shell">
      <div class="intro-copy">
        <a href="https://shop.thestarface.com/" class="cta">
          GET YOURS
        </a>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="page-shell">
    <div class="pt-12 pb-8">

      <div class="footer-top">

        <div class="footer-links text-sm">
          <div>
            <div class="footer-heading mb-4">About</div>
            <a href="about.html" class="footer-link">About Us</a>
          </div>

          <div>
            <div class="footer-heading mb-4">Support</div>
            <a href="https://shop.thestarface.com/pages/contact" class="footer-link">Contact</a>
          </div>

          <div>
            <div class="footer-heading mb-4">Legal</div>
            <a href="https://shop.thestarface.com/policies/privacy-policy" class="footer-link block">Privacy</a>
            <a href="terms.html" class="footer-link block">Terms</a>
          </div>
        </div>

        <div class="connect-column">
          <div class="footer-heading mb-4">Connect</div>

          <div class="social-slot">
            <a href="https://instagram.com/thestarfaceco" class="social-icon" target="_blank">
              <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
                <circle cx="12" cy="12" r="4.2"></circle>
                <circle cx="17.4" cy="6.6" r="1"></circle>
              </svg>
            </a>
          </div>
        </div>

      </div>

      <div class="footer-copy">
        © 2026 STARFACE Ltd. All rights reserved.
      </div>

    </div>
  </div>
</footer>

</body>
</html>

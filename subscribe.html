<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <title>Subscribe — STARFACE</title>
  <meta
    name="description"
    content="Subscribe for updates from STARFACE and be first to hear about drops, releases, and new arrivals."
  />

  <link
    rel="icon"
    href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 6 L57 40 L94 50 L57 60 L50 94 L43 60 L6 50 L43 40 Z' fill='black'/></svg>"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --font-head: 'Space Grotesk', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      background: #ffffff;
      color: #000000;
    }

    .display,
    h1, h2, h3 {
      font-family: var(--font-head);
      letter-spacing: 0.02em;
    }

    .header-shell {
      width: 100%;
      padding-left: 20px;
      padding-right: 44px;
      box-sizing: border-box;
    }

    .page-shell {
      max-width: 920px;
      margin: 0 auto;
      padding-left: 36px;
      padding-right: 36px;
      box-sizing: border-box;
    }

    .cta-link {
      text-decoration: none;
      color: #000;
      border: 1px solid rgba(0,0,0,0.16);
      transition: all 0.22s ease;
    }

    .cta-link:hover {
      background: #f5f5f5;
    }

    @media (max-width: 768px) {
      .header-shell,
      .page-shell {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>

<body>

  <header class="pt-4 pb-4">
    <div class="header-shell">
      <div class="relative h-16 md:h-20">
        <a href="welcome.html" aria-label="STARFACE home" class="absolute left-0 -top-2">
          <img
            src="images/STARFACELOGO.png"
            alt="STARFACE"
            class="h-28 md:h-32 w-auto"
          />
        </a>
      </div>
    </div>
  </header>

  <main class="min-h-[60vh] flex items-center">
    <div class="page-shell w-full text-center py-16 md:py-24">
      <h1 class="display text-3xl md:text-4xl uppercase mb-5">
        You’re In
      </h1>

      <p class="text-black/80 text-base md:text-lg max-w-[34rem] mx-auto leading-relaxed">
        Thanks for subscribing. You’ll be first to hear about new drops, releases, and updates from STARFACE.
      </p>

      <a
        href="welcome.html"
        class="cta-link inline-block mt-10 rounded-md px-6 py-2.5 text-sm md:text-base font-medium"
      >
        ← Back to Welcome
      </a>
    </div>
  </main>

  <footer>
    <div class="page-shell">
      <div class="py-6 border-t border-black/10 flex flex-col items-center gap-4 text-sm text-black/60">
        <div class="flex flex-wrap items-center justify-center gap-5">
          <a href="about.html" class="hover:text-black">About</a>
          <a href="privacy.html" class="hover:text-black">Privacy</a>
          <a href="terms.html" class="hover:text-black">Terms</a>
          <a href="contact.html" class="hover:text-black">Contact</a>
        </div>

        <div>
          © 2025 STARFACE Ltd. All rights reserved.
        </div>
      </div>
    </div>
  </footer>

</body>
</html>

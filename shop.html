<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE — Shop</title>
  <meta name="description" content="Shop Space Kid Series 01 in six colour variants." />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #000;
    }

    .display {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.05em;
    }

    .header-shell {
      width: 100%;
      padding-left: 20px;
      padding-right: 44px;
      box-sizing: border-box;
    }

    .page-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding-left: 36px;
      padding-right: 36px;
      box-sizing: border-box;
    }

    .product-card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .product-card img {
      transition: transform 0.4s ease;
    }

    .product-card:hover img {
      transform: scale(1.03);
    }

    @media (max-width: 768px) {
      .header-shell,
      .page-shell {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>

<body>

  <header class="pt-4 pb-6">
    <div class="header-shell">
      <a href="welcome.html" aria-label="STARFACE home">
        <img src="images/STARFACELOGO.png" alt="STARFACE" class="h-28 md:h-32 w-auto">
      </a>
    </div>
  </header>

  <section class="pb-10">
    <div class="page-shell">
      <p class="text-[13px] md:text-[14px] uppercase tracking-[0.18em] text-black/55">
        Space Kid Series 01
      </p>

      <h1 class="display mt-3 text-2xl md:text-3xl uppercase">
        Shop Colourways
      </h1>
    </div>
  </section>

  <section class="pb-20">
    <div class="page-shell grid grid-cols-2 md:grid-cols-3 gap-x-8 gap-y-14">

      <a href="origin.html" class="product-card">
        <img src="images/origin.JPG" alt="Origin">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Origin</p>
        <p class="mt-1 text-sm text-black/65">£205</p>
      </a>

      <a href="autumn.html" class="product-card">
        <img src="images/autumn.JPG" alt="Autumn">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Autumn</p>
        <p class="mt-1 text-sm text-black/65">£295</p>
      </a>

      <a href="bubblegum.html" class="product-card">
        <img src="images/bubblegum.JPG" alt="Bubblegum">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Bubblegum</p>
        <p class="mt-1 text-sm text-black/65">£245</p>
      </a>

      <a href="urban.html" class="product-card">
        <img src="images/urban.JPG" alt="Urban">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Urban</p>
        <p class="mt-1 text-sm text-black/65">£295</p>
      </a>

      <a href="chrome.html" class="product-card">
        <img src="images/chrome.JPG" alt="Chrome">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Chrome</p>
        <p class="mt-1 text-sm text-black/65">£295</p>
      </a>

      <a href="midnight.html" class="product-card">
        <img src="images/midnight.JPG" alt="Midnight">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Midnight</p>
        <p class="mt-1 text-sm text-black/65">£245</p>
      </a>

    </div>
  </section>

  <footer>
    <div class="page-shell">
      <div class="py-6 text-center text-sm text-black/60">
        © 2025 STARFACE Ltd. All rights reserved.
      </div>
    </div>
  </footer>

</body>
</html>

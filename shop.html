<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE — Shop</title>
  <meta name="description" content="Shop Space Kid Series 01 in six colour variants." />

  <link
    rel="icon"
    href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 6 L57 40 L94 50 L57 60 L50 94 L43 60 L6 50 L43 40 Z' fill='black'/></svg>"
  />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
    }

    html {
      background: var(--bg);
      overscroll-behavior-x: none;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .display {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.05em;
    }

    .header-shell {
      width: 100%;
      padding-left: 20px;
      padding-right: 44px;
      box-sizing: border-box;
    }

    .page-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding-left: 36px;
      padding-right: 36px;
      box-sizing: border-box;
    }

    .product-card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .product-card img {
      transition: transform 0.4s ease;
    }

    .product-card:hover img {
      transform: scale(1.03);
    }

    /* ===== FOOTER ===== */

    .footer-heading {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
    }

    .footer-link {
      color: rgba(0, 0, 0, 0.72);
      text-decoration: none;
    }

    .footer-link:hover {
      color: #000;
    }

    .footer-links .footer-link + .footer-link {
      margin-top: 8px;
    }

    .footer-top {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 44px;
      align-items: start;
      min-height: 140px;
    }

    .footer-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(100px, 135px));
      gap: 22px;
    }

    .footer-mark-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 6px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .footer-mark {
      width: 100px;
      height: auto;
    }

    .connect-column {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 250px;
    }

    .social-slot {
      display: flex;
      gap: 20px;
    }

    .social-icon {
      opacity: 0.72;
      transition: 0.25s;
    }

    .social-icon:hover {
      opacity: 1;
    }

    .footer-join {
      width: 250px;
      padding-top: 34px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .join-label {
      display: block;
      margin-bottom: 12px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
      width: 100%;
      text-align: right;
    }

    .join-button {
      height: 44px;
      padding: 0 18px;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
    }

    .join-button:hover {
      background: #111;
      color: #fff;
      transform: translateY(-1px);
    }

    .join-note {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.48);
      text-align: right;
      max-width: 250px;
    }

    .footer-copy {
      padding-top: 30px;
      text-align: center;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      .header-shell,
      .page-shell {
        padding-left: 18px;
        padding-right: 18px;
      }

      .footer-top {
        grid-template-columns: 1fr;
      }

      .footer-mark-wrap {
        position: static;
        transform: none;
        justify-content: flex-start;
      }

      .footer-mark {
        width: 180px;
      }

      .connect-column {
        align-items: flex-start;
      }

      .footer-join {
        width: 100%;
        align-items: flex-start;
      }

      .join-label,
      .join-note {
        text-align: left;
      }
    }
  </style>
</head>

<body>

  <header class="pt-4 pb-6">
    <div class="header-shell">
      <a href="welcome.html" aria-label="STARFACE home">
        <img src="images/STARFACELOGO.png" alt="STARFACE" class="h-28 md:h-32 w-auto">
      </a>
    </div>
  </header>

  <section class="pb-10">
    <div class="page-shell">
      <p class="text-[13px] md:text-[14px] uppercase tracking-[0.18em] text-black/55">
        Space Kid Series 01
      </p>

      <h1 class="display mt-3 text-2xl md:text-3xl uppercase">
        Choose your expression
      </h1>
    </div>
  </section>

  <section class="pb-20">
    <div class="page-shell grid grid-cols-2 md:grid-cols-3 gap-x-8 gap-y-14">

      <a href="origin.html" class="product-card">
        <img src="images/origin.JPG" alt="Origin">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Origin</p>
        <p class="mt-1 text-sm text-black/65">£269</p>
      </a>

      <a href="midnight.html" class="product-card">
        <img src="images/midnight.JPG" alt="Midnight">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Midnight</p>
        <p class="mt-1 text-sm text-black/65">£269</p>
      </a>

      <a href="autumn.html" class="product-card">
        <img src="images/autumn.JPG" alt="Autumn">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Autumn</p>
        <p class="mt-1 text-sm text-black/65">£269</p>
      </a>

      <a href="bubblegum.html" class="product-card">
        <img src="images/bubblegum.JPG" alt="Bubblegum">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Bubblegum</p>
        <p class="mt-1 text-sm text-black/65">£269</p>
      </a>

      <a href="urban.html" class="product-card">
        <img src="images/urban.JPG" alt="Urban">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Urban</p>
        <p class="mt-1 text-sm text-black/65">£299</p>
      </a>

      <a href="chrome.html" class="product-card">
        <img src="images/chrome.JPG" alt="Chrome">
        <p class="mt-4 text-sm uppercase tracking-[0.18em]">Chrome</p>
        <p class="mt-1 text-sm text-black/65">£299</p>
      </a>

    </div>
  </section>

  <footer>
    <div class="page-shell">
      <div class="border-t border-black/10 pt-12 pb-8">

        <div class="footer-top">

          <!-- LEFT -->
          <div class="footer-links text-sm">
            <div>
              <div class="footer-heading mb-4">About</div>
              <a href="about.html" class="footer-link">About Us</a>
            </div>

            <div>
              <div class="footer-heading mb-4">Support</div>
              <a href="contact.html" class="footer-link">Contact</a>
            </div>

            <div>
              <div class="footer-heading mb-4">Legal</div>
              <a href="privacy.html" class="footer-link block">Privacy</a>
              <a href="terms.html" class="footer-link block">Terms</a>
            </div>
          </div>

          <!-- CENTER LOGO -->
          <div class="footer-mark-wrap">
            <img src="images/starface-mark.png" alt="" class="footer-mark" />
          </div>

          <!-- RIGHT -->
          <div class="connect-column">
            <div class="footer-heading mb-4">Connect</div>

            <div class="social-slot">
              <a
                href="https://www.instagram.com/thestarfaceco/"
                target="_blank"
                rel="noopener noreferrer"
                class="social-icon"
                aria-label="Instagram"
              >
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="5" stroke="black" stroke-width="1.5"/>
                  <circle cx="12" cy="12" r="4" stroke="black" stroke-width="1.5"/>
                  <circle cx="17.5" cy="6.5" r="1.2" fill="black"/>
                </svg>
              </a>

              <a
                href="https://www.tiktok.com/@thestarfaceco"
                target="_blank"
                rel="noopener noreferrer"
                class="social-icon"
                aria-label="TikTok"
              >
                <svg width="28" height="28" viewBox="0 0 24 24" fill="black">
                  <path d="M16 3c.5 2 2 3.5 4 4v3c-1.5 0-3-.5-4-1.3V16a5 5 0 1 1-5-5c.3 0 .7 0 1 .1v3a2 2 0 1 0 2 2V3h2z"/>
                </svg>
              </a>
            </div>

            <div class="footer-join">
              <a href="https://thestarfaceco.kit.com/02ad492181" class="join-button">Sign Up</a>
              <div class="join-note">No Spam. Only drops.</div>
            </div>
          </div>

        </div>

        <div class="footer-copy">
          © 2025 STARFACE Ltd. All rights reserved.
        </div>
      </div>
    </div>
  </footer>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE</title>
  <meta
    name="description"
    content="STARFACE™ presents SpaceKid — a limited collectible available in six colour variants."
  />

  <link rel="icon" href="/favicon.ico" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --font-head: 'Space Grotesk', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

      --entry-bg: #fefdfb;
      --entry-text: #000000;
      --entry-muted: rgba(0, 0, 0, 0.42);
      --entry-border: rgba(0, 0, 0, 0.82);

      --entry-top-pad: clamp(6px, 1.2vh, 14px);
      --entry-bottom-pad: clamp(8px, 1.4vh, 16px);
      --logo-gap: clamp(4px, 0.8vh, 10px);
      --copyright-gap: clamp(6px, 0.8vh, 10px);

      --logo-max-h: clamp(52px, 10vh, 110px);
      --copyright-h: 18px;

      --image-max-h: calc(
        100dvh
        - var(--entry-top-pad)
        - var(--entry-bottom-pad)
        - calc(var(--logo-max-h) * 2)
        - var(--logo-gap)
        - 84px
        - var(--copyright-gap)
        - var(--copyright-h)
      );
    }

    html {
      height: 100%;
      background: var(--entry-bg);
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-body);
      background: var(--entry-bg);
      color: var(--entry-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }

    .display,
    h1, h2, h3 {
      font-family: var(--font-head);
      letter-spacing: 0.02em;
    }

    .use-star-cursor:hover {
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><polygon points='12,0 15,9 24,12 15,15 12,24 9,15 0,12 9,9' fill='%23000000'/></svg>"), auto;
    }

    .entry-screen {
      position: fixed;
      inset: 0;
      background: var(--entry-bg);
      overflow: hidden;
    }

    .entry-wrap {
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: var(--entry-bg);
    }

    .entry-panel {
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      justify-items: center;
      align-items: start;
      text-align: center;
      box-sizing: border-box;
      padding-top: var(--entry-top-pad);
      padding-bottom: var(--entry-bottom-pad);
      background: var(--entry-bg);
      overflow: hidden;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.75s ease forwards;
    }

    .delay-1 { animation-delay: 0.04s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.28s; }
    .delay-4 { animation-delay: 0.38s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .entry-logo {
      width: min(1400px, 96vw);
      max-width: 1400px;
      max-height: calc(var(--logo-max-h) * 2);
      height: auto;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }

    .entry-silhouette-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-top: var(--logo-gap);
      overflow: hidden;
      min-height: 0;
    }

    .entry-silhouette {
      width: auto;
      height: auto;
      max-width: min(720px, 84vw);
      max-height: var(--image-max-h);
      display: block;
      object-fit: contain;
    }

    .entry-enter-wrap {
      position: absolute;
      bottom: 27%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 2;
    }

    .entry-enter {
      appearance: none;
      -webkit-appearance: none;
      min-height: 54px;
      padding: 0.9rem 2.2rem;
      min-width: 170px;
      border-radius: 999px;
      border: 2px solid var(--entry-border);
      background: transparent;
      color: var(--entry-text);
      font-family: var(--font-body);
      font-size: clamp(0.92rem, 0.95vw, 1.06rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      line-height: 1;
      cursor: pointer;
      transition:
        color 0.2s ease,
        border-color 0.2s ease,
        background-color 0.2s ease,
        transform 0.2s ease,
        box-shadow 0.25s ease;
    }

    .entry-enter:hover {
      color: #fff;
      border-color: #000;
      background-color: #000;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.08),
        0 6px 18px rgba(0, 0, 0, 0.12),
        0 0 18px rgba(0, 0, 0, 0.12);
    }

    .entry-enter:focus-visible {
      outline: 2px solid rgba(217, 119, 6, 0.45);
      outline-offset: 4px;
    }

    .entry-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .entry-copyright {
      margin-top: var(--copyright-gap);
      font-size: 11px;
      line-height: 1.2;
      min-height: var(--copyright-h);
      color: var(--entry-muted);
      text-align: center;
      letter-spacing: 0.01em;
    }

    @media (max-height: 700px) {
      :root {
        --logo-max-h: clamp(44px, 8vh, 80px);
        --copyright-gap: clamp(5px, 0.7vh, 8px);
      }

      .entry-enter {
        min-width: 150px;
        min-height: 46px;
        padding: 0.75rem 1.8rem;
        font-size: 0.9rem;
      }

      .entry-copyright {
        font-size: 10px;
      }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      :root {
        --entry-top-pad: 4px;
        --entry-bottom-pad: 6px;
        --logo-gap: 2px;
        --copyright-gap: 4px;
        --logo-max-h: 54px;
        --copyright-h: 14px;
      }

      .entry-logo {
        max-width: min(420px, 48vw);
      }

      .entry-silhouette {
        max-width: min(430px, 46vw);
      }

      .entry-enter-wrap {
        bottom: 6%;
      }

      .entry-enter {
        min-width: 136px;
        min-height: 38px;
        padding: 0.65rem 1.5rem;
        font-size: 0.82rem;
        letter-spacing: 0.18em;
      }

      .entry-copyright {
        font-size: 9px;
      }
    }

    @media (max-width: 768px) {
      .entry-logo {
        width: min(360px, 82vw);
        max-width: none;
      }

      .entry-silhouette {
        max-width: min(410px, 86vw);
        max-height: 58vh;
      }

      .entry-enter-wrap {
        bottom: 18%;
      }

      .entry-enter {
        min-width: 155px;
        min-height: 46px;
        padding: 0.82rem 1.95rem;
        font-size: 0.95rem;
      }

      .entry-copyright {
        font-size: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-up,
      .entry-enter {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>

  <meta property="og:title" content="STARFACE" />
  <meta
    property="og:description"
    content="STARFACE™ presents SpaceKid — a limited collectible available in six colour variants."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.thestarface.com/" />
  <meta property="og:image" content="https://www.thestarface.com/images/STARFACELOGOBLACK.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="STARFACE" />
  <meta
    name="twitter:description"
    content="STARFACE™ presents SpaceKid — a limited collectible available in six colour variants."
  />
  <meta name="twitter:image" content="https://www.thestarface.com/images/STARFACELOGOBLACK.png" />
</head>

<body>
  <audio
    id="enterSound"
    src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
    preload="auto"
  ></audio>

  <div id="entryScreen" class="entry-screen">
    <div class="entry-wrap">
      <div class="entry-panel">
        <img
          src="images/STARFACELOGO.png"
          alt="STARFACE"
          class="entry-logo fade-up delay-1 select-none pointer-events-none"
          loading="eager"
          decoding="async"
        />

        <div class="entry-silhouette-wrap">
          <img
            src="images/entryimage.png"
            alt="SpaceKid"
            class="entry-silhouette fade-up delay-2 select-none pointer-events-none"
            loading="eager"
            decoding="async"
          />

          <div class="entry-enter-wrap fade-up delay-3">
            <button
              id="enterSiteBtn"
              class="entry-enter use-star-cursor"
              type="button"
            >
              Enter
            </button>
          </div>
        </div>

        <div class="entry-bottom">
          <div class="entry-copyright fade-up delay-4">
            © 2025 STARFACE Ltd. All rights reserved.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const enterSiteBtn = document.getElementById('enterSiteBtn');
    const enterSound = document.getElementById('enterSound');

    enterSiteBtn.addEventListener('click', () => {
      if (enterSound) {
        enterSound.currentTime = 0;
        enterSound.play().catch(() => {});
      }

      setTimeout(() => {
        window.location.href = 'welcome.html';
      }, 180);
    });
  </script>
</body>
</html>

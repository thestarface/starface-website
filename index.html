<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE</title>
  <meta name="description" content="STARFACE™ presents Spacekid — Series 01, a limited collectible available in six colourways." />

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #fefdfb;
      --text: #000000;
      --font-head: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    .entry-page {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      overflow: hidden;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 10;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .top-nav a {
      position: relative;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.66);
      text-decoration: none;
      white-space: nowrap;
      padding-bottom: 5px;
    }

    .top-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: #000;
      transition: width 0.22s ease;
    }

    .top-nav a:hover {
      color: #000;
    }

    .top-nav a:hover::after {
      width: 100%;
    }

    .logo-bar {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(280px, 18vw);
      opacity: 0;
      animation: logoFade 0.75s ease 0.04s forwards;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-wrap {
      position: absolute;
      top: 128px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: min(620px, 46vw);
      display: flex;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      animation: heroFade 0.75s ease 0.15s forwards;
    }

    .hero-image {
      width: auto;
      height: min(72vh, 720px);
      max-width: 100%;
      object-fit: contain;
      display: block;
    }

    .intro-block {
      position: absolute;
      left: 42px;
      bottom: 42px;
      z-index: 5;
      max-width: 560px;
    }

    .intro-title {
      font-family: var(--font-head);
      font-size: 20px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 10px 0;
    }

    .intro-sub {
      font-size: 12px;
      line-height: 1.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.62);
      margin: 0 0 18px 0;
      white-space: nowrap;
    }

    .entry-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #000;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1px solid rgba(0,0,0,0.55);
      padding-bottom: 4px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .entry-cta:hover {
      opacity: 0.65;
      transform: translateX(2px);
    }

    .ig-link {
      position: absolute;
      right: 42px;
      bottom: 42px;
      z-index: 5;
      color: #000;
      opacity: 0.64;
      transition: opacity 0.2s ease;
    }

    .ig-link:hover { opacity: 1; }

    .instagram-icon {
      width: 30px;
      height: 30px;
      display: block;
    }

    .copyright {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 10px;
      color: rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.75s ease forwards;
    }

    .delay-1 { animation-delay: 0.04s; }
    .delay-3 { animation-delay: 0.26s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes logoFade {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes heroFade {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 900px) {
      .entry-page {
        min-height: 100dvh;
        padding: 24px 22px 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: visible;
      }

      .top-nav,
      .logo-bar,
      .hero-wrap,
      .intro-block,
      .ig-link,
      .copyright {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        bottom: auto;
        transform: none;
      }

      .top-nav {
        order: 1;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px 22px;
        margin-bottom: 28px;
      }

      .top-nav a {
        font-size: 11px;
        letter-spacing: 0.11em;
      }

      .logo-bar {
        order: 2;
        width: min(240px, 62vw);
        margin-bottom: 26px;
        animation: fadeUp 0.75s ease 0.04s forwards;
      }

      .hero-wrap {
        order: 3;
        width: min(390px, 84vw);
        animation: fadeUp 0.75s ease 0.15s forwards;
      }

      .hero-image {
        width: min(390px, 84vw);
        height: auto;
        max-height: none;
      }

      .intro-block {
        order: 4;
        width: 100%;
        max-width: 420px;
        margin-top: 28px;
        align-self: flex-start;
      }

      .intro-title {
        font-size: 18px;
      }

      .intro-sub {
        font-size: 11px;
        white-space: normal;
        max-width: 300px;
      }

      .ig-link {
        order: 5;
        align-self: flex-end;
        margin-top: 28px;
      }

      .copyright {
        order: 6;
        margin-top: 12px;
        font-size: 9px;
      }
    }

    @media (max-width: 420px) {
      .top-nav {
        gap: 14px 18px;
      }

      .top-nav a {
        font-size: 10px;
      }

      .logo-bar {
        width: min(220px, 64vw);
      }

      .hero-image {
        width: min(86vw, 370px);
      }
    }
  </style>
</head>

<body>
  <main class="entry-page">

    <nav class="top-nav fade-up delay-1" aria-label="Primary">
      <a href="https://shop.thestarface.com/">Starface Store</a>
      <a href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="https://shop.thestarface.com/pages/contact">Contact</a>
      <a href="https://shop.thestarface.com/pages/faq">FAQ</a>
    </nav>

    <div class="logo-bar">
      <img src="images/STARFACELOGO.png" alt="STARFACE" class="logo" />
    </div>

    <div class="hero-wrap">
      <img src="images/entryimage.png" alt="Spacekid sketch" class="hero-image" />
    </div>

    <section class="intro-block fade-up delay-3">
      <h1 class="intro-title">Debut Drop</h1>
      <p class="intro-sub">Spacekid — Series 01. Six Colourways. Limited Edition.</p>
      <a href="https://shop.thestarface.com/" class="entry-cta">Get Yours →</a>
    </section>

    <a href="https://instagram.com/thestarfaceco" class="ig-link fade-up delay-3" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
        <circle cx="12" cy="12" r="4.2"></circle>
        <circle cx="17.4" cy="6.6" r="1"></circle>
      </svg>
    </a>

    <div class="copyright">
      © 2026 STARFACE Ltd. All rights reserved.
    </div>

  </main>
</body>
</html>

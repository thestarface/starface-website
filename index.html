<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE</title>
  <meta name="description" content="STARFACE™ presents Spacekid — Series 01, a limited collectible available in six colourways." />

  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #fefdfb;
      --text: #000000;
      --font-head: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    .entry-page {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      overflow: hidden;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 10;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .top-nav a {
      position: relative;
      font-size: 13.5px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.66);
      text-decoration: none;
      white-space: nowrap;
      padding-bottom: 5px;
      display: flex;
      align-items: center;
    }

    .top-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: #000;
      transition: width 0.22s ease;
    }

    .top-nav a:hover {
      color: #000;
    }

    .top-nav a:hover::after {
      width: 100%;
    }

    .nav-ig {
      display: flex;
      align-items: center;
    }

    .nav-ig svg {
      width: 18px;
      height: 18px;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .nav-ig:hover svg {
      opacity: 1;
    }

    .logo-bar {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(280px, 18vw);
      height: 18px;
      display: flex;
      align-items: center;
      opacity: 0;
      animation: logoFade 0.75s ease 0.04s forwards;
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-wrap {
      position: absolute;
      top: 118px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: min(620px, 46vw);
      display: flex;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      animation: heroFade 0.75s ease 0.15s forwards;
    }

    .hero-image {
      width: auto;
      height: min(72vh, 720px);
      max-width: 100%;
      object-fit: contain;
      display: block;
    }

    .intro-block {
      position: absolute;
      left: 42px;
      bottom: 42px;
      z-index: 5;
      max-width: 560px;
    }

    .intro-title {
      font-family: var(--font-head);
      font-size: 20px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 6px 0;
    }

    .intro-sub {
      font-size: 12px;
      line-height: 1.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.62);
      margin: 0 0 14px 0;
      white-space: nowrap;
    }

    .entry-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #000;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1.5px solid #000;
      padding-bottom: 5px;
      margin-top: 8px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .entry-cta:hover {
      opacity: 0.65;
      transform: translateX(2px);
    }

    .copyright {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 10px;
      color: rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    @keyframes logoFade {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes heroFade {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 900px) {
      .entry-page {
        min-height: 100dvh;
        padding: 26px 20px 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
      }

      .top-nav,
      .logo-bar,
      .hero-wrap,
      .intro-block,
      .copyright {
        position: relative;
        top: auto;
        left: auto;
        bottom: auto;
        transform: none;
      }

      .logo-bar {
        order: 1;
        width: min(230px, 64vw);
        height: auto;
        margin: 0 auto 26px;
        justify-content: center;
      }

      .top-nav {
        order: 2;
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        gap: 14px 20px;
        margin: 0 auto 28px;
      }

      .top-nav a {
        font-size: 11px;
        letter-spacing: 0.12em;
      }

      .nav-ig svg {
        width: 17px;
        height: 17px;
      }

      .hero-wrap {
        order: 3;
        width: 100%;
        max-width: 390px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
      }

      .hero-image {
        width: min(82vw, 350px);
        height: auto;
        max-height: 50dvh;
        object-fit: contain;
      }

      .intro-block {
        order: 4;
        width: 100%;
        max-width: 390px;
        margin: 24px auto 0;
        text-align: left;
        align-self: center;
      }

      .intro-title {
        font-size: 20px;
      }

      .intro-sub {
        white-space: normal;
        max-width: 320px;
      }

      .copyright {
        order: 5;
        margin-top: auto;
        padding-top: 28px;
        text-align: center;
        font-size: 9.5px;
      }
    }

    @media (max-width: 420px) {
      .entry-page {
        padding-left: 18px;
        padding-right: 18px;
      }

      .top-nav {
        gap: 12px 16px;
        margin-bottom: 24px;
      }

      .top-nav a {
        font-size: 10.5px;
        letter-spacing: 0.11em;
      }

      .logo-bar {
        width: min(215px, 66vw);
        margin-bottom: 24px;
      }

      .hero-image {
        width: min(86vw, 330px);
        max-height: 48dvh;
      }

      .intro-block {
        margin-top: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="entry-page">

    <nav class="top-nav">
      <a href="https://shop.thestarface.com/">Starface Store</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="https://shop.thestarface.com/pages/contact">Contact</a>
      <a href="https://shop.thestarface.com/pages/faq">FAQ</a>

      <a href="https://instagram.com/thestarfaceco" target="_blank" class="nav-ig" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.4" cy="6.6" r="1"></circle>
        </svg>
      </a>
    </nav>

    <div class="logo-bar">
      <img src="images/STARFACELOGO.png" alt="STARFACE" class="logo" />
    </div>

    <div class="hero-wrap">
      <img src="images/entryimage.png" alt="Spacekid sketch" class="hero-image" />
    </div>

    <section class="intro-block">
      <h1 class="intro-title">Debut Drop</h1>
      <p class="intro-sub">Spacekid — Series 01. Limited Edition.</p>
      <a href="https://shop.thestarface.com/" class="entry-cta">Get Yours →</a>
    </section>

    <div class="copyright">
      © 2026 STARFACE Ltd. All rights reserved.
    </div>

  </main>
</body>
</html>

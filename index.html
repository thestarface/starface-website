<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>STARFACE</title>
  <meta name="description" content="STARFACE™ presents Spacekid — Series 01, a limited collectible available in six colourways." />

  <link rel="icon" href="/favicon.ico" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #fefdfb;
      --text: #000000;
      --muted: rgba(0,0,0,0.54);
      --soft: rgba(0,0,0,0.38);
      --font-head: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      height: 100dvh;
    }

    .entry-page {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      background: var(--bg);
      overflow: hidden;
    }

    .top-nav {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 5;
      display: flex;
      gap: 26px;
      align-items: center;
    }

    .top-nav a {
      font-size: 12px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.66);
      text-decoration: none;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .top-nav a:hover {
      color: #000;
    }

    .logo-wrap {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      width: min(820px, 56vw);
    }

    .logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-image-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .hero-image {
      width: auto;
      height: min(72vh, 720px);
      max-width: 62vw;
      object-fit: contain;
      display: block;
      transform: translateY(18px);
    }

    .intro-block {
      position: absolute;
      left: 42px;
      bottom: 42px;
      z-index: 5;
      max-width: 360px;
    }

    .intro-title {
      font-family: var(--font-head);
      font-size: 20px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 10px 0;
    }

    .intro-sub {
      font-size: 13px;
      line-height: 1.55;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.68);
      margin: 0 0 22px 0;
    }

    .entry-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #000;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1px solid rgba(0,0,0,0.55);
      padding-bottom: 4px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .entry-cta:hover {
      opacity: 0.65;
      transform: translateX(2px);
    }

    .ig-link {
      position: absolute;
      right: 42px;
      bottom: 42px;
      z-index: 5;
      color: #000;
      opacity: 0.64;
      transition: opacity 0.2s ease;
    }

    .ig-link:hover {
      opacity: 1;
    }

    .instagram-icon {
      width: 30px;
      height: 30px;
      display: block;
    }

    .copyright {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 10px;
      color: rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.75s ease forwards;
    }

    .delay-1 { animation-delay: 0.04s; }
    .delay-2 { animation-delay: 0.15s; }
    .delay-3 { animation-delay: 0.26s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .top-nav {
        top: 132px;
        left: 50%;
        transform: translateX(-50%);
        gap: 18px;
      }

      .top-nav a {
        font-size: 10px;
        letter-spacing: 0.11em;
      }

      .logo-wrap {
        top: 18px;
        width: min(360px, 82vw);
      }

      .hero-image {
        height: auto;
        width: min(82vw, 440px);
        max-width: none;
        transform: translateY(-6px);
      }

      .intro-block {
        left: 24px;
        right: 24px;
        bottom: 78px;
        max-width: none;
      }

      .intro-title {
        font-size: 18px;
      }

      .intro-sub {
        font-size: 11px;
        margin-bottom: 18px;
      }

      .ig-link {
        right: 24px;
        bottom: 28px;
      }

      .copyright {
        font-size: 9px;
        bottom: 10px;
      }
    }

    @media (max-width: 420px) {
      .top-nav {
        top: 118px;
        gap: 14px;
      }

      .top-nav a {
        font-size: 9.5px;
      }

      .logo-wrap {
        width: min(330px, 84vw);
      }

      .hero-image {
        width: min(86vw, 400px);
        transform: translateY(-10px);
      }

      .intro-block {
        bottom: 72px;
      }
    }

    @media (max-height: 650px) {
      .logo-wrap {
        width: min(520px, 48vw);
      }

      .hero-image {
        height: min(62vh, 500px);
      }

      .intro-block {
        bottom: 36px;
      }

      .copyright {
        display: none;
      }
    }
  </style>
</head>

<body>

  <main class="entry-page">

    <nav class="top-nav fade-up delay-1" aria-label="Primary">
      <a href="https://shop.thestarface.com/">Starface Store</a>
      <a href="about.html">About</a>
      <a href="https://shop.thestarface.com/pages/contact">Contact</a>
      <a href="https://shop.thestarface.com/pages/faq">FAQ</a>
    </nav>

    <div class="logo-wrap fade-up delay-1">
      <img src="images/STARFACELOGO.png" alt="STARFACE" class="logo" />
    </div>

    <div class="hero-image-wrap fade-up delay-2">
      <img src="images/entryimage.png" alt="Spacekid sketch" class="hero-image" />
    </div>

    <section class="intro-block fade-up delay-3">
      <h1 class="intro-title">Spacekid — Series 01</h1>
      <p class="intro-sub">Six Colourways. Limited Edition.</p>
      <a href="https://shop.thestarface.com/" class="entry-cta">
        Get Yours →
      </a>
    </section>

    <a href="https://instagram.com/thestarfaceco" class="ig-link fade-up delay-3" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
        <circle cx="12" cy="12" r="4.2"></circle>
        <circle cx="17.4" cy="6.6" r="1"></circle>
      </svg>
    </a>

    <div class="copyright">
      © 2026 STARFACE Ltd. All rights reserved.
    </div>

  </main>

</body>
</html>

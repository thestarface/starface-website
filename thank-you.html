<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <title>You're In — STARFACE</title>
  <meta
    name="description"
    content="You're in. Check your email to confirm access to future STARFACE drops."
  />

  <link
    rel="icon"
    href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 6 L57 40 L94 50 L57 60 L50 94 L43 60 L6 50 L43 40 Z' fill='black'/></svg>"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --font-head: 'Space Grotesk', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --bg: #ffffff;
      --text: #000000;
    }

    html {
      background: var(--bg);
      overscroll-behavior-x: none;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .display,
    h1, h2, h3 {
      font-family: var(--font-head);
      letter-spacing: 0.015em;
    }

    .header-shell {
      width: 100%;
      padding-left: 20px;
      padding-right: 44px;
      box-sizing: border-box;
    }

    .page-shell {
      max-width: 1340px;
      margin: 0 auto;
      padding-left: 36px;
      padding-right: 36px;
      box-sizing: border-box;
      width: 100%;
    }

    .thankyou-shell {
      max-width: 920px;
      margin: 0 auto;
    }

    .thankyou-copy {
      max-width: 34rem;
      margin-left: auto;
      margin-right: auto;
    }

    .thankyou-copy p {
      margin: 0;
      font-size: 17px;
      line-height: 1.9;
      color: rgba(0, 0, 0, 0.78);
    }

    .thankyou-copy p + p {
      margin-top: 10px;
    }

    .cta-link {
      text-decoration: none;
      color: #000;
      border: 1px solid rgba(0,0,0,0.16);
      transition: all 0.22s ease;
    }

    .cta-link:hover {
      background: #f5f5f5;
      transform: translateY(-1px);
    }

    /* ===== FOOTER ===== */

    .footer-heading {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
    }

    .footer-link {
      color: rgba(0,0,0,0.72);
      text-decoration: none;
    }

    .footer-link:hover {
      color: #000;
    }

    .footer-links .footer-link + .footer-link {
      margin-top: 8px;
    }

    .footer-top {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 44px;
      align-items: start;
      min-height: 140px;
    }

    .footer-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(100px, 135px));
      gap: 22px;
    }

    .footer-mark-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 6px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .footer-mark {
      width: 100px;
      height: auto;
      display: block;
    }

    .connect-column {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 250px;
    }

    .social-slot {
      display: flex;
      gap: 20px;
    }

    .social-icon {
      opacity: 0.72;
      transition: 0.25s;
    }

    .social-icon:hover {
      opacity: 1;
    }

    .footer-join {
      width: 250px;
      padding-top: 34px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .join-button {
      height: 44px;
      padding: 0 18px;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
    }

    .join-button:hover {
      background: #111;
      color: #fff;
      transform: translateY(-1px);
    }

    .join-note {
      font-size: 12px;
      color: rgba(0,0,0,0.48);
      margin-top: 10px;
      text-align: right;
      max-width: 250px;
    }

    .footer-copy {
      padding-top: 30px;
      text-align: center;
      font-size: 12px;
      color: rgba(0,0,0,0.5);
    }

    @media (max-width: 1024px) {
      .header-shell {
        padding-left: 18px;
        padding-right: 28px;
      }

      .page-shell {
        padding-left: 24px;
        padding-right: 24px;
      }
    }

    @media (max-width: 768px) {
      .header-shell,
      .page-shell {
        padding-left: 18px;
        padding-right: 18px;
      }

      .footer-top {
        grid-template-columns: 1fr;
      }

      .footer-mark-wrap {
        position: static;
        transform: none;
        justify-content: flex-start;
      }

      .footer-mark {
        width: 180px;
      }

      .connect-column {
        align-items: flex-start;
      }

      .footer-join {
        width: 100%;
        align-items: flex-start;
      }

      .join-note {
        text-align: left;
      }
    }
  </style>
</head>

<body>

  <header class="pt-4 pb-4">
    <div class="header-shell">
      <div class="relative h-16 md:h-20">
        <a href="welcome.html" aria-label="STARFACE home" class="absolute left-0 -top-2">
          <img
            src="images/STARFACELOGO.png"
            alt="STARFACE"
            class="h-28 md:h-32 w-auto"
          />
        </a>
      </div>
    </div>
  </header>

  <main class="min-h-[60vh] flex items-center flex-1">
    <div class="page-shell py-16 md:py-24">
      <div class="thankyou-shell text-center">

        <h1 class="display text-3xl md:text-4xl uppercase mb-6">
          You’re In
        </h1>

        <div class="thankyou-copy">
          <p>Check your email to confirm access.</p>
          <p>Future drops will be sent there first.</p>
        </div>

        <a
          href="welcome.html"
          class="cta-link inline-block mt-10 rounded-md px-6 py-2.5 text-sm md:text-base font-medium"
        >
          ← Back to Welcome
        </a>

      </div>
    </div>
  </main>

  <footer>
    <div class="page-shell">
      <div class="border-t border-black/10 pt-12 pb-8">

        <div class="footer-top">

          <!-- LEFT -->
          <div class="footer-links text-sm">
            <div>
              <div class="footer-heading mb-4">About</div>
              <a href="about.html" class="footer-link">About Us</a>
            </div>

            <div>
              <div class="footer-heading mb-4">Support</div>
              <a href="contact.html" class="footer-link">Contact</a>
            </div>

            <div>
              <div class="footer-heading mb-4">Legal</div>
              <a href="privacy.html" class="footer-link block">Privacy</a>
              <a href="terms.html" class="footer-link block">Terms</a>
            </div>
          </div>

          <!-- CENTER LOGO -->
          <div class="footer-mark-wrap">
            <img src="images/starface-mark.png" alt="" class="footer-mark" />
          </div>

          <!-- RIGHT -->
          <div class="connect-column">
            <div class="footer-heading mb-4">Connect</div>

            <div class="social-slot">
              <a href="https://www.instagram.com/thestarfaceco/" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Instagram">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="5" stroke="black" stroke-width="1.5"/>
                  <circle cx="12" cy="12" r="4" stroke="black" stroke-width="1.5"/>
                  <circle cx="17.5" cy="6.5" r="1.2" fill="black"/>
                </svg>
              </a>

              <a href="https://www.tiktok.com/@thestarfaceco" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="TikTok">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="black">
                  <path d="M16 3c.5 2 2 3.5 4 4v3c-1.5 0-3-.5-4-1.3V16a5 5 0 1 1-5-5c.3 0 .7 0 1 .1v3a2 2 0 1 0 2 2V3h2z"/>
                </svg>
              </a>
            </div>

            <div class="footer-join">
              <a href="https://thestarfaceco.kit.com/02ad492181" class="join-button">Sign Up</a>
              <div class="join-note">No Spam. Only drops.</div>
            </div>
          </div>

        </div>

        <div class="footer-copy">
          © 2025 STARFACE Ltd. All rights reserved.
        </div>

      </div>
    </div>
  </footer>

</body>
</html>
